# ============================================
# Server Configuration
# ============================================
server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=health,info

# ============================================
# Logging
# ============================================
logging.level.root=WARN
logging.level.br.com.sistema.bot=INFO

# ============================================
# Database - MySQL
# ============================================
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# Application Configuration
# ============================================
spring.jackson.serialization.indent-output=false

# ============================================
# CORS Configuration
# ============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ============================================
# WhatsApp Cloud API (Meta)
# ============================================
WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}

# ============================================
# Chatwoot (transferĂªncia para humano)
# ============================================
CHATWOOT_BASE_URL=${CHATWOOT_BASE_URL}
CHATWOOT_API_KEY=${CHATWOOT_API_KEY}
CHATWOOT_INBOX_ID=${CHATWOOT_INBOX_ID}

# ============================================
# Hubsoft
# ============================================
HUBSOFT_BASE_URL=${HUBSOFT_BASE_URL}
HUBSOFT_CLIENT_ID=${HUBSOFT_CLIENT_ID}
HUBSOFT_CLIENT_SECRET=${HUBSOFT_CLIENT_SECRET}
HUBSOFT_USERNAME=${HUBSOFT_USERNAME}
HUBSOFT_PASSWORD=${HUBSOFT_PASSWORD}
HUBSOFT_GRANT_TYPE=${HUBSOFT_GRANT_TYPE}
